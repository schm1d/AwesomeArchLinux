# Full performance / throughput profile
# Assumes a trusted workstation or server where throughput and responsiveness
# matter more than additional sysctl-level hardening.
#
# Installer option: full-performance
# Place this file at:
#   /etc/sysctl.d/99-sysctl.conf
#
# Apply with:
#   sudo sysctl --system

##########
# Memory
##########

# Keep application memory resident whenever possible.
vm.swappiness = 1

# Retain inode/dentry cache aggressively for build and developer workloads.
vm.vfs_cache_pressure = 50

# Use absolute dirty limits on large-memory systems.
vm.dirty_background_bytes = 1073741824
vm.dirty_bytes = 4294967296

# Leave enough free memory for bursts without over-reserving RAM.
vm.min_free_kbytes = 262144

# Avoid strict overcommit on mixed workstation/server loads.
vm.overcommit_memory = 0

##########
# Kernel
##########

# Keep a large PID space on high-core-count systems.
kernel.pid_max = 4194304

##########
# High-throughput networking
##########

# fq + bbr is a strong performance-first default for modern hosts.
net.core.default_qdisc = fq
net.ipv4.tcp_congestion_control = bbr

net.core.netdev_max_backlog = 32768
net.core.somaxconn = 8192

# Allow socket autotuning to scale higher than the conservative profile.
net.core.rmem_default = 4194304
net.core.wmem_default = 4194304
net.core.rmem_max = 67108864
net.core.wmem_max = 67108864
net.core.optmem_max = 524288

net.ipv4.tcp_rmem = 4096 262144 67108864
net.ipv4.tcp_wmem = 4096 65536 67108864
net.ipv4.udp_rmem_min = 8192
net.ipv4.udp_wmem_min = 8192

# Favor long-lived interactive and high-BDP flows.
net.ipv4.tcp_fastopen = 3
net.ipv4.tcp_mtu_probing = 1
net.ipv4.tcp_slow_start_after_idle = 0
net.ipv4.tcp_max_syn_backlog = 32768
net.ipv4.tcp_fin_timeout = 15
net.ipv4.tcp_tw_reuse = 1

# Faster dead-peer detection for busy application stacks.
net.ipv4.tcp_keepalive_time = 60
net.ipv4.tcp_keepalive_intvl = 10
net.ipv4.tcp_keepalive_probes = 6

# Keep basic resilience features enabled.
net.ipv4.tcp_syncookies = 1
net.ipv4.tcp_rfc1337 = 1
