# Secure workstation + high-throughput network
# Assumes this host is not acting as a router.
#
# Installer option: security+performance
#
# Place this file at:
#   /etc/sysctl.d/99-sysctl.conf
# Or keep the shipped filename if you prefer a separate drop-in:
#   /etc/sysctl.d/99-workstation-net.conf
#
# Apply with:
#   sudo sysctl --system

##########
# Memory
##########

# Keep swap reluctance low on a large-RAM workstation.
vm.swappiness = 10

# Reasonable cache retention without starving page cache reclaim.
vm.vfs_cache_pressure = 50

# Use absolute dirty limits on high-memory machines instead of ratios.
vm.dirty_background_bytes = 536870912
vm.dirty_bytes = 2147483648

# Keep some free memory for bursty allocations and reclaim stability.
vm.min_free_kbytes = 524288

# Avoid strict overcommit on a workstation.
vm.overcommit_memory = 0

##########
# Kernel hardening
##########

dev.tty.ldisc_autoload = 0

fs.protected_hardlinks = 1
fs.protected_symlinks = 1
fs.protected_fifos = 2
fs.protected_regular = 2
fs.suid_dumpable = 0

vm.mmap_min_addr = 65536
vm.mmap_rnd_bits = 32
vm.mmap_rnd_compat_bits = 16
vm.unprivileged_userfaultfd = 0

kernel.unprivileged_bpf_disabled = 1
kernel.kptr_restrict = 2
kernel.dmesg_restrict = 1
kernel.yama.ptrace_scope = 2
kernel.perf_event_paranoid = 3
kernel.kexec_load_disabled = 1
kernel.randomize_va_space = 2
kernel.sysrq = 0

# Keep a large PID space on high-core-count systems.
kernel.pid_max = 4194304

# Optional: stronger hardening, but may break Flatpak, bubblewrap,
# rootless containers, and some browser sandboxes.
# kernel.unprivileged_userns_clone = 0

##########
# IPv4 network hardening
##########

net.ipv4.ip_forward = 0

net.ipv4.conf.all.accept_source_route = 0
net.ipv4.conf.default.accept_source_route = 0

net.ipv4.conf.all.accept_redirects = 0
net.ipv4.conf.default.accept_redirects = 0
net.ipv4.conf.all.secure_redirects = 0
net.ipv4.conf.default.secure_redirects = 0

net.ipv4.conf.all.send_redirects = 0
net.ipv4.conf.default.send_redirects = 0

net.ipv4.conf.all.rp_filter = 1
net.ipv4.conf.default.rp_filter = 1

net.ipv4.conf.all.log_martians = 1
net.ipv4.conf.default.log_martians = 1

# Keep normal ping for diagnostics, but ignore dangerous/bogus cases.
net.ipv4.icmp_echo_ignore_all = 0
net.ipv4.icmp_echo_ignore_broadcasts = 1
net.ipv4.icmp_ignore_bogus_error_responses = 1

net.ipv4.tcp_syncookies = 1
net.ipv4.tcp_rfc1337 = 1
net.ipv4.tcp_fastopen = 3
net.ipv4.tcp_mtu_probing = 1

##########
# Optional IPv6 policy
##########

# Leave IPv6 enabled by default on fresh installs.
# Uncomment both lines only if you intentionally want IPv6 fully disabled.
# net.ipv6.conf.all.disable_ipv6 = 1
# net.ipv6.conf.default.disable_ipv6 = 1

##########
# High-throughput TCP
##########

# fq + bbr is the better workstation default.
net.core.default_qdisc = fq
net.ipv4.tcp_congestion_control = bbr

net.core.netdev_max_backlog = 16384
net.core.somaxconn = 4096

# Keep defaults moderate, allow autotuning to scale high.
net.core.rmem_default = 1048576
net.core.wmem_default = 1048576
net.core.rmem_max = 33554432
net.core.wmem_max = 33554432
net.core.optmem_max = 262144

net.ipv4.tcp_rmem = 4096 131072 33554432
net.ipv4.tcp_wmem = 4096 16384 33554432
net.ipv4.udp_rmem_min = 8192
net.ipv4.udp_wmem_min = 8192

# Conservative workstation-friendly TCP housekeeping.
net.ipv4.tcp_keepalive_time = 120
net.ipv4.tcp_keepalive_intvl = 30
net.ipv4.tcp_keepalive_probes = 6
net.ipv4.tcp_fin_timeout = 30
net.ipv4.tcp_max_syn_backlog = 16384

# Avoid stale "tuning guide" behavior.
net.ipv4.tcp_tw_reuse = 0

# Better for interactive and high-BDP flows.
net.ipv4.tcp_slow_start_after_idle = 0
